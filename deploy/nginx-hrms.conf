# VLJ HRMS — Synology / Nginx reverse proxy (reference config)
#
# Problem this fixes:
#   404/400 on /_next/static/chunks/app/... and /_next/static/css/...
#   Caused by stale .next files on disk OR nginx serving static files incorrectly.
#
# Rule: proxy ALL traffic to Next.js. Do NOT alias /_next/static to a folder.

upstream hrms_next {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 443 ssl http2;
  server_name hrms.varlakshmijewellery.co.in;

  # ssl_certificate ...
  # ssl_certificate_key ...

  client_max_body_size 20m;

  # IMPORTANT: no trailing slash on proxy_pass
  # IMPORTANT: do not use try_files or alias for /_next/static
  location / {
    proxy_pass http://hrms_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
